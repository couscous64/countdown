<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌞 Dovolenka 🏝️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Reset and layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Extra large background size allows the animation to 'move' through colors */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb, #d4fc79, #e6eae9);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: #4a4a4a;
            padding: 20px;
        }

        /* Smooth pastel color shifting animation */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphic container for contrast against changing background */
        .container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* Input styling */
        .input-group {
            margin-bottom: 30px;
        }

        input[type="datetime-local"] {
            padding: 10px 15px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            font-size: 1rem;
            color: #4a4a4a;
            outline: none;
        }

        /* Countdown Grid */
        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 15fr);
            gap: 15px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.5);
            padding: 15px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .number {
            font-size: 2.5rem;
            font-weight: 700;
            display: block;
            line-height: 1;
            margin-bottom: 5px;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌅 Letné dobrodružstvá 🏝️</h1>
        
        <div class="input-group">
            <!-- Allows the user to select a specific date and time -->
            <input type="datetime-local" id="target-date">
        </div>

        <div class="countdown">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Secs</span>
            </div>
        </div>
    </div>

    <script>
// DOM Elements
const dateInput = document.getElementById('target-date');
const daysEl = document.getElementById('days');
const hoursEl = document.getElementById('hours');
const minutesEl = document.getElementById('minutes');
const secondsEl = document.getElementById('seconds');

let countdownInterval;

// 1. Check if a date is already saved in localStorage
const savedDate = localStorage.getItem('userCountdownDate');

if (savedDate) {
    // If a saved date exists, use it!
    dateInput.value = savedDate;
} else {
    // 2. Fallback: If no saved date, set default to tomorrow at this exact time
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    dateInput.value = tomorrow.toISOString().slice(0, 16);
}

let hasFired = false; // Prevents confetti from triggering repeatedly every second

function updateCountdown() {
    const targetTime = new Date(dateInput.value).getTime();
    const now = new Date().getTime();
    const difference = targetTime - now;

    // If target date has passed or is reached
    if (difference <= 0) {
        clearInterval(countdownInterval);
        daysEl.innerText = "00";
        hoursEl.innerText = "00";
        minutesEl.innerText = "00";
        secondsEl.innerText = "00";

        // Trigger confetti exactly once when it hits 0
        if (!hasFired) {
            triggerPastelConfetti();
            hasFired = true;
        }
        return;
    }

    // Time calculations
    const days = Math.floor(difference / (1000 * 60 * 60 * 24));
    const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((difference % (1000 * 60)) / 1000);

    daysEl.innerText = days < 10 ? '0' + days : days;
    hoursEl.innerText = hours < 10 ? '0' + hours : hours;
    minutesEl.innerText = minutes < 10 ? '0' + minutes : minutes;
    secondsEl.innerText = seconds < 10 ? '0' + seconds : seconds;
}

// Custom pastel confetti burst function
function triggerPastelConfetti() {
    // Left side burst
    confetti({
        particleCount: 150,
        spread: 80,
        origin: { x: 0.2, y: 0.6 },
        colors: ['#ff9a9e', '#fecfef', '#a1c4fd', '#c2e9fb', '#d4fc79'] // Matching your pastel theme!
    });

    // Right side burst
    confetti({
        particleCount: 150,
        spread: 80,
        origin: { x: 0.8, y: 0.6 },
        colors: ['#ff9a9e', '#fecfef', '#a1c4fd', '#c2e9fb', '#d4fc79']
    });
}

// Start countdown immediately
updateCountdown();
clearInterval(countdownInterval);
countdownInterval = setInterval(updateCountdown, 1000);

// 3. Save the new date to localStorage whenever the user changes it
dateInput.addEventListener('change', () => {
    // Store the string value using a unique key
    localStorage.setItem('userCountdownDate', dateInput.value);
    hasFired = false; // Reset confetti trigger for new date

    clearInterval(countdownInterval);
    updateCountdown();
    countdownInterval = setInterval(updateCountdown, 1000);
});
    </script>
</body>
</html>
